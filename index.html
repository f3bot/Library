<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Arimo&display=swap" rel="stylesheet"> 
    <link rel="stylesheet" href="styles.css">
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library</title>
</head>
<body>
    <nav class="navbar">
        <div class="left">
            <img src="script.png" alt="book">
            <span>LIBRARY</span>
        </div>
    </nav>
    <main>
        <div class="button-div"> <!-- We to jakoś elegancko w prawy dolny róg wypierdol i tam daj pop-up forma zeby bylo elegnacko i troche we uprzatnij ten pierdolnik w jsie-->
            <button class="popup" onclick="openForm()">Add Book</button>
            <form action="#" class="form" id="form">
                <input type="text" name="title" id="title" placeholder="Title">
                <input type="text" name="author" id="author" placeholder="Author">
                <input type="text" name="pages" id="pages" placeholder="Pages">
                <input type="submit" value="Submit" id="submit" onclick="closeForm()">
            </form>
        </div>
        <div class="book-container">

        </div>
    </main>
    <script src="main.js"></script>
</body>
</html>
